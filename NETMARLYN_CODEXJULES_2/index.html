<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Netmarlyn - Desktop</title>

    <!-- Configuración PWA (Manifiesto e Íconos) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001342">

    <!-- Configuración para iOS (iPhone/iPad) -->
    <link rel="apple-touch-icon" href="assets/G_icono_netmarlyn.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Netmarlyn">

    <link rel="icon" type="image/png" href="assets/favicon.png?v=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container">
        <header class="logo-container">
            <img id="main-logo" src="assets/G_nombrelogo.png" alt="Netmarlyn Logo">
        </header>

        <section class="nebula-section">
            <div class="content-wrapper">
                <div class="illustration">
                    <img src="assets/G_maestro_alumno.png" alt="Maestro y Alumno">
                </div>
                <div class="text-content">
                    <div class="text-white">
                        Innovador Ecosistema Escolar Digital<br>
                        Métricas Académicas Inteligentes<br>
                        24/7
                    </div>
                    <div class="text-blue">
                        Plataforma escolar digital con identidad<br>
                        segura que integra control<br>
                        analítica pedagógica y<br>
                        supervisión parental en tiempo real<br>
                        para impulsar excelencia educativa.
                    </div>
                    <div class="button-area">
                        <img src="assets/G_boton_escaneo.png" alt="Botón Escaneo" class="scan-button">
                    </div>
                </div>
            </div>
        </section>

        <div class="title-colegios">
            COLEGIOS
        </div>

        <!-- MENÚ PRINCIPAL BOTTOM NAV (INACTIVO) -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <span>Escanear</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span>Infografías</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                <span>Reportes IA</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span>Mensajes</span>
            </a>
            <a href="#" class="nav-item">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <!-- Script para evitar SIEMPRE el caché de las imágenes durante el desarrollo -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var logo = document.getElementById("main-logo");
            if (logo) {
                // Le agrega un número aleatorio de tiempo al final (ej: ?v=170810...) para forzar la descarga de la imagen real.
                logo.src = 'assets/G_nombrelogo.png?v=' + new Date().getTime();
            }
        });

        // Registro del Service Worker para convertir la web en App (PWA) instalable
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Error al registrar el Service Worker:', error);
                    });
            });
        }
    </script>
</body>

</html>
