    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        // NUCLEAR CACHE BUSTER (v5.3.3)
        const CURRENT_VERSION = '8813';
        if (localStorage.getItem('nm_force_refresh_v') !== CURRENT_VERSION) {
            localStorage.setItem('nm_force_refresh_v', CURRENT_VERSION);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    for(let reg of regs) reg.unregister();
                });
            }
            if ('caches' in window) {
                caches.keys().then(names => {
                    for (let name of names) caches.delete(name);
                });
            }
            window.location.reload(true);
        }
    </script>

    <!-- Script para evitar SIEMPRE el caché de las imágenes durante el desarrollo -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var logo = document.getElementById("main-logo");
            if (logo) {
                // Le agrega un número aleatorio de tiempo al final (ej: ?v=170810...) para forzar la descarga de la imagen real.
                logo.src = 'assets/G_nombrelogo.png?v=' + new Date().getTime();
            }
        });

        // Script para acceso restringido a infografías
        function accederInfografias() {
            const pin = prompt("ADMINISTRADOR - INGRESE PIN MAESTRO DE ACCESO:");
            if (pin === '8813') {
                location.href = 'crear_infografia.html?v=8813';
            } else if (pin !== null) {
                alert("❌ PIN INCORRECTO. ACCESO DENEGADO.");
            }
        }

        // Registro del Service Worker para convertir la web en App (PWA) instalable
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Error al registrar el Service Worker:', error);
                    });
            });
        }
    </script>
