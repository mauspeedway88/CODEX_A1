<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUNET BUSTO A5 - V3.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000; /* Negro absoluto */
            display: flex;
            flex-direction: column;    /* Terminal abajo */
            justify-content: center;
            align-items: center;       /* Todo centrado */
            padding: 20px 0;
            width: 100vw;
            min-height: 100vh;
            gap: 12px;                 /* Espacio entre MAUNET y Consola */
        }
        /* [V45.4] Marco responsivo — el JS controla el tamaño real vía onMaunetResize() */
        #scene-container {
            width: auto;
            height: auto;
            border: 4px solid #115fff;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        /* [V29.0] Overlay CRT / Scanlines 12/10 */
        #scene-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.6;
            animation: crt-flicker 0.1s infinite;
        }
        @keyframes crt-flicker {
            0% { opacity: 0.55; }
            50% { opacity: 0.65; }
            100% { opacity: 0.58; }
        }
        #scene-container canvas {
            width:  100% !important;
            height: 100% !important;
            display: block;
            filter: drop-shadow(0px 0px 60px rgba(21, 87, 255, 0.69));
        }

        /* [V3.2] TERMINAL MAUNET — mismo ancho que el canvas (controlado por JS también) */
        #maunet-terminal {
            width: auto;
            background: #000;
            border: 4px solid #115fff;
            box-shadow: 0 0 12px #115fff88;
            font-family: 'Courier New', monospace;
            margin: 0 auto;
            box-sizing: border-box;
        }
        #maunet-output {
            padding: 10px 14px 6px;
            height: 210px;          /* [V45.4] 240px - 1 línea extra */
            max-height: 210px;
            overflow-y: auto;
            color: #b1b1b1;
            font-size: 21px;
            line-height: 1.10;      /* [V45.4] Compacto: más espacio para botones */
            border-bottom: 1px solid #00ff4133;
            word-wrap: break-word;
            /* [V33.10] Eliminado smooth scroll para que el auto-scroll sea instantáneo y no se quede atrás */
        }
        /* [V33.9] Scrollbar robusto para uso táctil (dedo) */
        #maunet-output::-webkit-scrollbar { width: 12px; }
        #maunet-output::-webkit-scrollbar-track { background: #001100; }
        #maunet-output::-webkit-scrollbar-thumb { 
            background: #00ff41; 
            border-radius: 6px;
            border: 2px solid #001100; /* Efecto de margen interno */
        }
        #output-prefix { color: #888888; margin-right: 6px; }
        #output-text   { color: #b1b1b1; }
        #maunet-input-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            gap: 8px;
        }
        #input-prefix { color: #888888; font-size: 21px; white-space: nowrap; }
        #maunet-text-input {
            flex: 1;
            background: #000;
            border: none;
            outline: none;
            color: #b1b1b1;
            font-family: 'Courier New', monospace;
            font-size: 21px;        /* [V45.2] Subido a 21px para emparejar con output */
            caret-color: #b1b1b1;
        }
        #maunet-text-input::placeholder { color: #00ff41; opacity: 0.75; }
        #btn-send-text, #btn-mic {
            background: none;
            border: 1px solid #00ff41;
            color: #b1b1b1;
            cursor: pointer;
            padding: 3px 10px;
            font-size: 14px;
            transition: background 0.2s;
        }
        #btn-send-text:hover, #btn-mic:hover { background: #00ff4122; }
        /* [V5.0] BARRA DE PROGRESO VERBAL */
        #voice-progress-container {
            width: 100%;
            height: 4px;
            background: #002200;
            margin-top: 4px;
            display: none; /* Se activa al hablar */
            position: relative;
            overflow: hidden;
        }
        #voice-progress-bar {
            width: 0%;
            height: 100%;
            background: #00ff41;
            box-shadow: 0 0 8px #00ff41;
            transition: width 0.1s linear;
        }
        #maunet-input-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            gap: 12px;
        }
        #btn-mic {
            background: #001100;
            border: 2px solid #00ff41;
            color: #00ff41;
            cursor: pointer;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 4px;
            transition: opacity 0.8s ease, transform 0.8s ease, all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            /* [V45.8] Oculto al inicio — aparece después del primer saludo */
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }
        /* Clase que JS añade cuando Maunet termina su primer saludo */
        #btn-mic.mic-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        #btn-mic:active { background: #00ff41; color: #000; }
        #btn-mic.active { color: #ff3333; border-color: #ff3333; box-shadow: 0 0 12px #ff333388; }

        /* ═══ PANEL DE ICONOS DE ESTADO (arriba-izquierda del canvas) ═══ */
        #maunet-status-panel {
            position: absolute;
            top: 8px;
            left: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50; /* Por encima del canvas, debajo del overlay CRT */
            pointer-events: none; /* No interfiere con el 3D */
        }
        #maunet-status-panel img {
            display: block;
            opacity: 1.0; 
            transition: opacity 0.4s ease;
        }
        /* El icono de chat desaparece del todo si no está activo */
        #icon-chat {
            display: none !important;
        }
        #icon-chat.active {
            display: block !important;
        }
        #icon-wifi {
            opacity: 0.4; /* El wifi se queda tenue si no hay red, o brillante si hay */
            transition: opacity 0.4s ease;
        }
        #icon-wifi.active {
            opacity: 1.0;
        }

        /* ═══ BOTÓN STOP ═══ */
        #btn-stop {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            opacity: 0.35;
            transition: opacity 0.3s ease, transform 0.1s ease;
            pointer-events: none; /* Inactivo cuando Maunet no habla */
        }
        #btn-stop.active {
            opacity: 1.0;
            pointer-events: all; /* Se activa cuando Maunet habla */
        }
        #btn-stop:hover { transform: scale(1.15); }
        #btn-stop img { display: block; }
        /* ═══ CINEMA OVERLAY V46.0 — MAUNET ORIGINAL ═══ */
        #cinema-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 0.6s ease;
        }
        #cinema-overlay.hidden { opacity: 0; pointer-events: none; }

        /* ── Título superior intermitente ── */
        #cinema-init-title {
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 22px;
            opacity: 0;
            transition: opacity 0.5s ease;
            animation: init-glow 1.5s ease-in-out infinite alternate;
        }
        #cinema-init-title.visible { opacity: 1; }
        @keyframes init-glow {
            from { opacity: 0.5; text-shadow: 0 0 10px #00ffcc; }
            to   { opacity: 1;   text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; }
        }

        /* ── Barra de progreso ── */
        #cinema-bar-container {
            width: 260px;
            height: 16px;
            border: 2px solid #00ff41;
            border-radius: 4px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #cinema-bar-container.visible { opacity: 1; }
        #cinema-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00cc33, #00ff41);
            box-shadow: 0 0 10px #00ff41;
            border-radius: 2px;
        }
        #cinema-percent {
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            letter-spacing: 2px;
            margin-top: 8px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #cinema-percent.visible { opacity: 1; }
        #cinema-phrase {
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            margin-top: 18px;
            opacity: 0;
            transition: opacity 0.4s ease;
            min-height: 20px;
        }
        #cinema-phrase.visible { opacity: 0.7; }

        /* ── Pantalla de bifurcación ── */
        #cinema-choice {
            opacity: 0;
            transition: opacity 0.8s ease;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 120px; /* ~5 líneas abajo del borde superior */
            box-sizing: border-box;
        }
        #cinema-choice.visible { opacity: 1; }
        
        .title-netmarlyn {
            color: #386cff;
            font-family: 'Courier New', monospace;
            font-size: 26px;
            letter-spacing: 4px;
            text-shadow: 0 0 18px #386cff;
            margin: 0;
        }
        
        .title-maunet-ready {
            color: #0cff00;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            letter-spacing: 3px;
            text-shadow: 0 0 12px #0cff00;
            margin: 0;
            margin-top: 48px; /* ~2 líneas abajo */
        }
        
        .subtitle-choice {
            color: #0cff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 2px;
            text-align: center;
            line-height: 2em; /* Salto de 1 línea entre textos */
            margin: 0;
            margin-top: 96px; /* ~4 líneas abajo */
        }
        .choice-row {
            display: flex;
            flex-direction: column;
            gap: 30px; 
            justify-content: center;
            align-items: center;
            margin-top: 72px; /* ~3 líneas abajo */
        }
        .choice-btn {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            position: relative;
            display: inline-block;
        }
        .choice-btn img {
            width: 175px;
            height: auto;
            border-radius: 10px;
            opacity: 0.9;
            transition: transform 0.2s, opacity 0.2s;
            animation: pulse-tap 1.8s ease-in-out infinite;
            display: block;
        }
        .choice-btn span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none; /* Que el clic pase al botón */
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .choice-btn:hover img {
            transform: scale(1.06);
            opacity: 1;
        }
        @keyframes pulse-tap {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 0.65; transform: scale(0.97); }
        }

        @keyframes blink-loading {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #unlock-overlay h1 {
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 36px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #00ffcc;
            margin-bottom: 20px;
        }
        #unlock-overlay p {
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff41;
        }
        /* Responsivo móvil: centrar correctamente */
        @media (max-width: 600px) {
            body { padding: 10px 0; gap: 8px; }
            #scene-container,
            #maunet-terminal {
                width: 100vw !important;
                max-width: 100vw;
                border-left: none;
                border-right: none;
            }
            #scene-container canvas {
                width: 100% !important;
                height: auto !important;
            }
        }
    </style>
</head>

    <!-- ═══ [V46.0] CINEMA OVERLAY MAUNET ORIGINAL ═══ -->
    <div id="cinema-overlay">
        <div id="cinema-init-title">MAUNET... INICIANDO...</div>
        <div id="cinema-bar-container">
            <div id="cinema-bar"></div>

                </button>

    <script>
    // ═══ [V46.0] DIRECTOR CINEMATOGRÁFICO — MAUNET ORIGINAL ═══
    // Negro(2s) → Barra stutters(6-8s) → Negro(2s) → Bifurcación → (Maunet) → Negro(2s) → Maunet habla
    (function() {
        var overlay    = document.getElementById('cinema-overlay');
        var initTitle  = document.getElementById('cinema-init-title');
        var barCont    = document.getElementById('cinema-bar-container');
        var bar        = document.getElementById('cinema-bar');
        var percent    = document.getElementById('cinema-percent');
        var phrase     = document.getElementById('cinema-phrase');
        var choice     = document.getElementById('cinema-choice');
        var modelLoaded = false;

        var PHRASES = [
            '…conectando circuitos…', '…preparando tu experiencia…',
            '…cargando módulos…', '…inicializando motor 3D…',
            '…calibrando sensores…', '…sincronizando datos…',
            '…activando neuronas…', '…despertando a MAUNET…',
            '…optimizando respuesta…', '…enlazando con NetMarlyn…',
            '…verificando conexión…', '…cargando personalidad…',
            '…sistemas en línea…', '…activando protocolo visual…'
        ];
        function shuffle(a) { for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
        function sleep(ms) { return new Promise(function(r){setTimeout(r,ms);}); }

        // ── Barra con stutters ──
        function animateBar(durationMs) {
            return new Promise(function(resolve) {
                var virtualElapsed = 0;
                var lastTick = Date.now();
                var isPaused = false;
                var pauseEndTime = 0;
                var nextPause = 0.1 + Math.random() * 0.15;
                function tick() {
                    var now = Date.now();
                    var dt = now - lastTick;
                    lastTick = now;
                    if (isPaused) {
                        if (now >= pauseEndTime) isPaused = false;
                    } else {
                        virtualElapsed += dt;
                        var raw = Math.min(virtualElapsed / durationMs, 1);
                        if (raw >= nextPause && raw < 0.95) {
                            isPaused = true;
                            pauseEndTime = now + 200 + Math.floor(Math.random() * 200);
                            nextPause = raw + 0.1 + Math.random() * 0.15;
                        }
                    }
                    var pct = Math.floor(Math.min(virtualElapsed / durationMs, 1) * 100);
                    bar.style.width = pct + '%';
                    percent.textContent = pct + '%';
                    if (pct < 100) { requestAnimationFrame(tick); }
                    else { bar.style.width='100%'; percent.textContent='100%'; resolve(); }
                }
                requestAnimationFrame(tick);
            });
        }

        // ── Rotador de frases ──
        var phraseTimer = null;
        function startPhraseRotation() {
            var shuffled = shuffle(PHRASES.slice()), idx = 0;
            phrase.textContent = shuffled[0];
            phrase.classList.add('visible');
            phraseTimer = setInterval(function() {
                phrase.classList.remove('visible');
                setTimeout(function() {
                    idx = (idx + 1) % shuffled.length;
                    phrase.textContent = shuffled[idx];
                    phrase.classList.add('visible');
                }, 400);
            }, 1200 + Math.floor(Math.random() * 600));
        }
        function stopPhraseRotation() {
            if (phraseTimer) clearInterval(phraseTimer);
            phrase.classList.remove('visible');
        }

        // ── ORQUESTADOR ──
        async function runCinemaSequence() {
            // FASE 1: Negro puro (2s)
            await sleep(2000);

            // FASE 1.5: Barra aparece en 0% (1s de suspense)
            initTitle.classList.add('visible');
            bar.style.width = '0%';
            percent.textContent = '0%';
            barCont.classList.add('visible');
            percent.classList.add('visible');
            await sleep(1000);

            // FASE 2: Barra con stutters (6-8s)
            startPhraseRotation();
            await animateBar(3000 + Math.floor(Math.random() * 2000)); // 3000-5000ms (al azar)
            stopPhraseRotation();

            // FASE 3: Todo desaparece — Negro (2s)
            initTitle.classList.remove('visible');
            barCont.classList.remove('visible');
            percent.classList.remove('visible');
            setTimeout(function() {
                initTitle.style.display = 'none';
                barCont.style.display = 'none';
                percent.style.display = 'none';
                phrase.style.display = 'none';
            }, 600); // Dar tiempo al fade out antes de quitarlos del flujo
            await sleep(2000);

            // FASE 4: Pantalla de bifurcación (esperar que 3D cargue)
            while (!modelLoaded) { await sleep(200); }
            choice.classList.add('visible');

            // Esperar elección del usuario
            var userChoice = await new Promise(function(resolve) {
                document.getElementById('btn-choice-maunet').addEventListener('click', function() { resolve('maunet'); });
                document.getElementById('btn-choice-netmarlyn').addEventListener('click', function() { resolve('netmarlyn'); });
            });

            if (userChoice === 'netmarlyn') {
                // Redirigir a la página principal de NetMarlyn
                choice.classList.remove('visible');
                await sleep(800);
                window.location.href = '../index.html';
                return;
            }

            // FASE 5: Maunet seleccionado — Negro final (2s)
            choice.classList.remove('visible');
            await sleep(2000);

            // FASE 6: Abrir cortina
            overlay.classList.add('hidden');
            setTimeout(function() { overlay.style.display = 'none'; }, 600);

            if (window.triggerInitialGreeting) window.triggerInitialGreeting();
        }

        // API para que main.js notifique que el 3D ya cargó
        window._showUnlockReady = function() {
            modelLoaded = true;
            window._maunetReady = true;
            console.log('[V46.0 SS2] Modelo 3D cargado. Esperando selección...');
        };

        runCinemaSequence();
    })();
    </script>
