<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infografía Dinámica - Colegio Alegría</title>
    <!-- CARGAMOS EL ARCHIVO DONDE ESTÁN GUARDADAS TODAS LAS INFOGRAFÍAS (El JSON camuflado en JS) -->
    <script src="base_datos.js"></script>

    <style>
        :root {
            /* Colores Base (Gris claro premium para Colegio Alegría) */
            --bg-color: #f5f7fa;
            --text-main: #2c3e50;
            --text-muted: #5e6d7a;
            --accent: #3498db;
            /* Azul base, se sobrescribe con JS */
            --card-box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            padding: 20px 0;
            background-color: #e4e9f0;
            /* Fondo del navegador */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* PLANTILLA MAESTRA: El Lienzo Blanco/Gris */
        .infografia-canvas {
            width: 500px;
            min-height: 700px;
            background-color: var(--bg-color);
            border-radius: 12px;
            box-shadow: var(--card-box-shadow);
            position: relative;
            padding: 30px;
            box-sizing: border-box;
            border-top: 6px solid var(--accent);
        }

        .colegio-header {
            text-align: right;
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .header h1 {
            color: var(--accent);
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0 0 30px 0;
        }

        .grafico-wrap-flotante {
            float: left;
            width: 250px;
            height: 250px;
            margin: 0 20px 10px -10px;
            position: relative;
        }

        /* Contenedor donde se inyectará el SVG Matemático */
        .svg-container {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.15));
        }

        /* Texto que rodea */
        .texto-rodeando {
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.6;
            text-align: justify;
        }

        /* Apuntadores (Tags flotantes) */
        .tag {
            position: absolute;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            color: var(--accent);
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            z-index: 10;
        }

        .tag-1 {
            top: 20%;
            left: 10%;
        }

        .tag-2 {
            bottom: 10%;
            right: 10%;
        }

        /* Estilo para mensajes de error */
        .error-msg {
            color: red;
            text-align: center;
            padding: 50px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- LA PLANTILLA HTML (Sus cajas están vacías, esperando a ser rellenadas) -->
    <div class="infografia-canvas" id="canvas-principal">
        <div class="colegio-header">🏛️ Colegio Alegría</div>

        <div class="header">
            <!-- Los IDs sirven como "anclas" para que Javascript inyecte el texto aquí -->
            <h1 id="inyeccion-titulo">Cargando...</h1>
            <p id="inyeccion-subtitulo">...</p>
        </div>

        <div class="grafico-wrap-flotante">
            <div class="tag tag-1" id="inyeccion-tag1">Tag1</div>
            <div class="tag tag-2" id="inyeccion-tag2">Tag2</div>

            <!-- Aquí se inyectan las matemáticas del SVG -->
            <svg class="svg-container" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" id="inyeccion-svg">
                <!-- Vacio. JavaScript lo llenará. -->
            </svg>
        </div>

        <p class="texto-rodeando" id="inyeccion-texto">
            <!-- Vacio. JavaScript lo llenará. -->
        </p>

    </div>

    <!-- EL MOTOR LÓGICO: "El Cerebro que junta plantilla y datos" -->
    <script>
        // Función que se ejecuta apenas carga la página
        window.onload = function () {

            // 1. LEER LA URL: ¿Qué infografía pidió el alumno? 
            // Buscamos algo como esto en el link:  visor_maestro.html?id=info_001
            const parametrosURL = new URLSearchParams(window.location.search);
            const idSolicitado = parametrosURL.get('id');

            // 2. BUSCAR EN LA BASE DE DATOS
            // NETMARLYN_DB es la variable que vive en nuestro archivo "base_datos.js" (pesa ~1 KB)
            const infografiaData = NETMARLYN_DB[idSolicitado];

            if (infografiaData) {
                // 3. INYECCIÓN MÁGICA: Si la encuentra, metemos los textos en las cajas vacías del HTML

                // Cambiamos el color base de la plantilla dependiendo del tema!
                document.documentElement.style.setProperty('--accent', infografiaData.tema_color);

                // Llenamos los textos
                document.getElementById('inyeccion-titulo').innerText = infografiaData.titulo;
                document.getElementById('inyeccion-subtitulo').innerText = infografiaData.subtitulo;
                document.getElementById('inyeccion-tag1').innerText = infografiaData.etiqueta_1;
                document.getElementById('inyeccion-tag2').innerText = infografiaData.etiqueta_2;
                document.getElementById('inyeccion-texto').innerText = infografiaData.texto_principal;

                // INYECCIÓN DEL ECOSISTEMA 3D: Llenamos el SVG vacío con el código puro
                document.getElementById('inyeccion-svg').innerHTML = infografiaData.svg_grafico;

            } else {
                // Si alguien pone un link malo, le sale esto:
                document.getElementById('canvas-principal').innerHTML =
                    "<div class='error-msg'>⚠️ Infografía no encontrada en la base de datos. <br> Intenta añadir ?id=info_001 o info_002 a la URL.</div>";
            }
        };
    </script>
</body>

</html>
