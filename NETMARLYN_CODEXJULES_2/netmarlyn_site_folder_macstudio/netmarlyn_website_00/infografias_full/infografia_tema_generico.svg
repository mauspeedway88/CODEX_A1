<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200" style="background-color: #FAFAFA; font-family: 'Segoe UI', Arial, Helvetica, sans-serif;">
  <defs>
    <linearGradient id="primaryAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056D2" />
      <stop offset="100%" stop-color="#00A2FF" />
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFDA00" />
      <stop offset="100%" stop-color="#FF8C00" />
    </radialGradient>
    <filter id="lightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Header / Title Section -->
  <rect x="0" y="0" width="800" height="150" fill="#E8F1FC" />
  <text x="400" y="70" text-anchor="middle" font-size="44" font-weight="900" fill="#1A1A1A">EL CICLO DEL AGUA</text>
  <text x="400" y="105" text-anchor="middle" font-size="18" font-weight="400" fill="#4B5563">El viaje perpetuo de las moléculas de H₂O a través de la atmósfera y la tierra</text>
  <rect x="340" y="130" width="120" height="4" fill="url(#primaryAccent)" rx="2"/>

  <!-- PANEL 1: EVAPORACIÓN -->
  <g transform="translate(60, 200)" filter="url(#lightShadow)">
    <rect width="680" height="200" rx="16" fill="#FFFFFF" />
    
    <!-- SVG Graphic 1 -->
    <g transform="translate(40, 40)">
      <path d="M 0 100 Q 30 80, 60 100 T 120 100 T 180 100 L 180 140 L 0 140 Z" fill="#00A2FF" />
      <path d="M 0 110 Q 30 130, 60 110 T 120 110 T 180 110 L 180 140 L 0 140 Z" fill="#0056D2" />
      <circle cx="20" cy="20" r="30" fill="url(#sunGrad)" />
      
      <!-- Arrow logic -->
      <path d="M 60 75 L 60 30 M 50 40 L 60 30 L 70 40" stroke="#FF8C00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M 120 85 L 120 40 M 110 50 L 120 40 L 130 50" stroke="#FF8C00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
      <!-- Label -->
      <rect x="65" y="8" width="40" height="20" rx="10" fill="#1A1A1A"/>
      <text x="85" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">100°C+</text>
    </g>

    <!-- Text Block 1 -->
    <text x="260" y="60" font-size="24" font-weight="700" fill="#1A1A1A">1. EVAPORACIÓN</text>
    <rect x="260" y="75" width="40" height="3" fill="#00A2FF" />
    <foreignObject x="260" y="90" width="380" height="90">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 15px; color: #4B5563; line-height: 1.6; margin: 0;">
        La energía térmica del sol calienta océanos, ríos y lagos. El agua líquida cambia a estado gaseoso y asciende en forma de <strong>vapor de agua</strong> a la atmósfera. Aproximadamente el 90% del vapor atmosférico proviene de este proceso oceánico.
      </div>
    </foreignObject>
  </g>

  <!-- Connection Arrow 1 -->
  <path d="M 400 400 L 400 440" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6" fill="none" />
  <polygon points="400,450 395,435 405,435" fill="#00A2FF" />

  <!-- PANEL 2: CONDENSACIÓN -->
  <g transform="translate(60, 470)" filter="url(#lightShadow)">
    <rect width="680" height="200" rx="16" fill="#FFFFFF" />
    
    <!-- SVG Graphic 2 (Mirrored Layout) -->
    <g transform="translate(480, 40)"> 
      <path d="M 40 80 Q 20 80, 20 60 Q 20 40, 50 40 Q 60 10, 100 10 Q 140 10, 150 40 Q 180 40, 180 60 Q 180 80, 150 80 Z" fill="#E5E7EB" />
      <path d="M 50 90 Q 30 90, 30 70 Q 30 50, 60 50 Q 70 20, 110 20 Q 150 20, 160 50 Q 190 50, 190 70 Q 190 90, 160 90 Z" fill="#D1D5DB" />
      
      <!-- Cooling arrows -->
      <path d="M 80 50 L 50 50 M 60 40 L 50 50 L 60 60" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
      <path d="M 140 60 L 170 60 M 160 50 L 170 60 L 160 70" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
      <!-- Label -->
      <rect x="75" y="-15" width="50" height="20" rx="10" fill="#0056D2"/>
      <text x="100" y="-1" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">ENFRIAMIENTO</text>
    </g>

    <!-- Text Block 2 -->
    <text x="40" y="60" font-size="24" font-weight="700" fill="#1A1A1A">2. CONDENSACIÓN</text>
    <rect x="40" y="75" width="40" height="3" fill="#00A2FF" />
    <foreignObject x="40" y="90" width="380" height="90">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 15px; color: #4B5563; line-height: 1.6; margin: 0;">
        Al alcanzar grandes altitudes terrestres, el vapor sufre una bajada de temperatura debido a la presión atmosférica inferior y <strong>se agrupa formando minúsculas gotas líquidas</strong>, creando espesísimas formaciones (nubes).
      </div>
    </foreignObject>
  </g>

  <!-- Connection Arrow 2 -->
  <path d="M 400 670 L 400 710" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6" fill="none" />
  <polygon points="400,720 395,705 405,705" fill="#00A2FF" />

  <!-- PANEL 3: PRECIPITACIÓN E INFILTRACIÓN -->
  <g transform="translate(60, 740)" filter="url(#lightShadow)">
    <rect width="680" height="200" rx="16" fill="#FFFFFF" />
    
    <!-- SVG Graphic 3 -->
    <g transform="translate(40, 40)">
      <path d="M 40 70 Q 20 70, 20 50 Q 20 30, 50 30 Q 60 0, 100 0 Q 140 0, 150 30 Q 180 30, 180 50 Q 180 70, 150 70 Z" fill="#6B7280" />
      
      <!-- Rain & Accumulation -->
      <path d="M 60 85 L 50 115" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
      <path d="M 90 85 L 80 120" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
      <path d="M 120 85 L 110 110" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
      <path d="M 150 85 L 140 125" stroke="#00A2FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
      
      <path d="M 0 140 L 60 80 L 100 120 L 150 50 L 200 140 Z" fill="#4B5563" />
      <path d="M 0 140 L 60 80 L 100 120 L 60 140 Z" fill="#374151" />
      
      <!-- Label -->
      <rect x="75" y="115" width="50" height="20" rx="10" fill="#1A1A1A"/>
      <text x="100" y="129" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">GRAVEDAD</text>
    </g>

    <!-- Text Block 3 -->
    <text x="260" y="60" font-size="24" font-weight="700" fill="#1A1A1A">3. PRECIPITACIÓN</text>
    <rect x="260" y="75" width="40" height="3" fill="#00A2FF" />
    <foreignObject x="260" y="90" width="380" height="90">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 15px; color: #4B5563; line-height: 1.6; margin: 0;">
        El peso acumulado en las nubes vence la resistencia del aire, provocando la caída de agua en forma líquida (lluvia) o sólida (nieve, granizo). Seguidamente ocurre la <strong>infiltración</strong> hacia las vastas capas freáticas subterráneas.
      </div>
    </foreignObject>
  </g>

  <!-- Footer -->
  <rect x="0" y="1050" width="800" height="150" fill="#1A1A1A" />
  <text x="400" y="1120" text-anchor="middle" font-size="16" font-weight="400" fill="#D1D5DB">INFOGRAFÍA ESTRUCTURADA 100% SVG • NETMARLYN EDUCACIONAL</text>
  <text x="400" y="1140" text-anchor="middle" font-size="12" font-weight="400" fill="#6B7280">Diseño limpio, acentos al 15%, y distribución espacial editorial (uso adecuado de espacio negativo).</text>
</svg>
