<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMarlyn - Sitio en Mantenimiento</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
        }

        .info {
            margin-top: 20px;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>

<body>
    <img src="netmarlyn_mantenimiento.jpg" alt="NetMarlyn en Mantenimiento">
    <div class="info" id="status-info">Iniciando conexión segura...</div>

    <script>
        // Funcionalidad para capturar IP y enviar a la Mac Mini
        async function captureTelemetry() {
            try {
                // 1. Obtener datos de la visita via trace de Cloudflare
                let ipInfo = { ip: 'desconocida', loc: 'desconocido' };
                try {
                    const cfTraceRes = await fetch('/cdn-cgi/trace');
                    const traceText = await cfTraceRes.text();
                    ipInfo = traceText.split('\n').reduce((acc, line) => {
                        const parts = line.split('=');
                        if (parts.length === 2) acc[parts[0]] = parts[1];
                        return acc;
                    }, {});
                } catch (e) {
                    // Fallback to external API if Cloudflare trace is unavailable
                    const fallbackRes = await fetch('https://api.ipify.org?format=json');
                    const fallbackData = await fallbackRes.json();
                    ipInfo.ip = fallbackData.ip;
                }

                // Construir payload
                const payload = {
                    ip: ipInfo.ip || 'desconocida',
                    pais: ipInfo.loc || 'desconocido',
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    fuente: 'pagina_mantenimiento_edge'
                };

                document.getElementById('status-info').innerText = 'Red central detectando parámetros de conexión...';

                // 2. Enviar la analítica a un endpoint de la Mac Mini
                // Asumimos que se podrá capturar por el servidor Python en localhost:8000
                await fetch('https://www.netmarlyn.site/api/visitas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    mode: 'no-cors' // Use no-cors in case the server is offline or doesn't support OPTS
                });

            } catch (error) {
                console.error("Error capturando telemetría:", error);
            }
        }

        // Ejecutar al cargar la ventana
        window.onload = captureTelemetry;
    </script>
</body>

</html>
