<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Registro X — Netmarlyn Demo</title>
    <link rel="icon" type="image/png" href="assets/favicon.png?v=1">
    <link rel="stylesheet" href="style.css?v=8813">
    <script src="js/nav_active.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* ── REGISTRO X — ESTILOS DEMO RAPIDO ── */
        * { box-sizing: border-box; }

        .rx-container {
            max-width: 520px;
            margin: 90px auto 40px;
            padding: 0 16px;
        }

        .rx-title {
            color: white;
            font-size: 20px;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .rx-subtitle {
            color: #4fc3ff;
            font-size: 10px;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 28px;
        }

        /* ── TABS ── */
        .rx-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .rx-tab {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0,229,255,0.25);
            color: #4fc3ff;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .rx-tab.active {
            background: rgba(0,229,255,0.12);
            border-color: #00e5ff;
            color: white;
        }

        /* ── PANEL ── */
        .rx-panel { display: none; }
        .rx-panel.visible { display: block; }

        /* ── CÁMARA ── */
        .rx-cam-outer {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 16px;
            aspect-ratio: 4/3;
            border: 2px solid #00e5ff;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 24px rgba(0,229,255,0.2);
        }
        .rx-cam-outer video,
        .rx-cam-outer canvas { width: 100%; height: 100%; object-fit: cover; }

        /* ── PREVIEW FOTO ── */
        .rx-preview-wrap {
            display: none;
            position: relative;
            width: 100%;
            max-width: 200px;
            margin: 0 auto 16px;
            border: 2px solid #d8ff00;
            border-radius: 10px;
            overflow: hidden;
        }
        .rx-preview-wrap img { width: 100%; display: block; }

        /* ── INPUTS ── */
        .rx-field {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(0,229,255,0.35);
            color: white;
            font-size: 15px;
            padding: 12px 14px;
            border-radius: 10px;
            width: 100%;
            outline: none;
            margin-bottom: 12px;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .rx-field::placeholder { color: #4fc3ff88; }

        /* ── BOTONES ── */
        .rx-btn {
            display: block;
            width: 100%;
            padding: 13px;
            border-radius: 30px;
            border: none;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .rx-btn-primary {
            background: #d8ff00;
            color: #001342;
        }
        .rx-btn-primary:hover { background: #eeff44; }
        .rx-btn-secondary {
            background: transparent;
            border: 1px solid #00e5ff;
            color: #00e5ff;
        }
        .rx-btn-secondary:hover { background: rgba(0,229,255,0.08); }
        .rx-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── QR RESULTADO ── */
        .rx-result {
            display: none;
            text-align: center;
            padding: 20px;
            background: rgba(0,229,255,0.05);
            border: 1px solid rgba(0,229,255,0.3);
            border-radius: 14px;
            margin-top: 16px;
        }
        .rx-result img.qr-img {
            width: 200px;
            height: 200px;
            border: 3px solid #d8ff00;
            border-radius: 10px;
            margin: 0 auto 12px;
            display: block;
        }
        .rx-result .rx-code-text {
            color: #d8ff00;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .rx-result .rx-ok-msg {
            color: #00e5ff;
            font-size: 11px;
            letter-spacing: 1px;
        }

        /* ── IDENTIFICADO ── */
        .rx-id-card {
            display: none;
            text-align: center;
            padding: 24px 16px;
            background: rgba(0,229,255,0.05);
            border: 1px solid rgba(0,229,255,0.3);
            border-radius: 14px;
            margin-top: 16px;
        }
        .rx-id-card img.person-photo {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #d8ff00;
            margin: 0 auto 14px;
            display: block;
        }
        .rx-id-card .person-name {
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .rx-id-card .person-code {
            color: #4fc3ff;
            font-size: 10px;
            letter-spacing: 2px;
            font-family: monospace;
        }

        /* ── CONTADOR ── */
        .rx-counter {
            text-align: center;
            color: #4fc3ff;
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        /* ── SCANNER FRAME ── */
        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: #00e5ff; box-shadow: 0 0 12px #00e5ff;
            animation: scan 2s infinite linear;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .rx-status {
            color: #4fc3ff;
            font-size: 10px;
            letter-spacing: 1px;
            text-align: center;
            min-height: 18px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="main-container">
    <header class="top-bar">
        <nav class="top-nav">
                <a href="index.html?v=8813">inicio</a> - 
                <a href="colegios.html?v=8813">colegios</a> - 
                <a href="soporte.html?v=8813">soporte</a>
            </nav>
        <div class="logo-container">
            <img id="main-logo" src="assets/G_nombrelogo.png" alt="Netmarlyn Logo">
        </div>
    </header>

    <div class="rx-container">
        <div class="rx-title">Registro X</div>
        <div class="rx-subtitle">📸 DEMO NOCTURNO — NETMARLYN</div>

        <!-- Counter -->
        <div class="rx-counter" id="rx-counter">Cargando registros...</div>

        <!-- TABS -->
        <div class="rx-tabs">
            <div class="rx-tab active" id="tab-reg" onclick="switchTab('reg')">📸 Registrar</div>
            <div class="rx-tab" id="tab-scan" onclick="switchTab('scan')">🔍 Identificar</div>
        </div>

        <!-- ══════════════════════════════════════════ -->
        <!--  PANEL A: REGISTRAR                       -->
        <!-- ══════════════════════════════════════════ -->
        <div class="rx-panel visible" id="panel-reg">
            <!-- Camera -->
            <div class="rx-cam-outer" id="cam-wrap-reg">
                <video id="video-reg" playsinline muted autoplay></video>
                <canvas id="canvas-reg" style="display:none;"></canvas>
            </div>

            <!-- Preview after capture -->
            <div class="rx-preview-wrap" id="preview-wrap">
                <img id="preview-img" src="" alt="Foto">
            </div>

            <div class="rx-status" id="reg-status">Cámara iniciando...</div>

            <button class="rx-btn rx-btn-secondary" id="btn-capture" onclick="capture()">📷 Capturar Foto</button>
            <button class="rx-btn rx-btn-secondary" id="btn-retake" onclick="retake()" style="display:none;">↩️ Repetir</button>

            <input type="text" class="rx-field" id="field-name" placeholder="Nombre completo..." autocomplete="off" style="display:none;">

            <button class="rx-btn rx-btn-primary" id="btn-register" onclick="register()" style="display:none;" disabled>✅ Guardar y Generar QR</button>

            <!-- Resultado QR -->
            <div class="rx-result" id="reg-result">
                <img class="qr-img" id="qr-img-gen" src="" alt="QR">
                <div class="rx-code-text" id="qr-code-text">--</div>
                <div class="rx-ok-msg">✅ Registro guardado correctamente</div>
                <div style="color:#4fc3ff; font-size:9px; margin-top:6px; letter-spacing:1px;">Muestra este QR para identificarte</div>
                <button class="rx-btn rx-btn-secondary" onclick="resetReg()" style="margin-top:14px;">+ Registrar otra persona</button>
            </div>
        </div>

        <!-- ══════════════════════════════════════════ -->
        <!--  PANEL B: IDENTIFICAR                     -->
        <!-- ══════════════════════════════════════════ -->
        <div class="rx-panel" id="panel-scan">
            <div class="rx-cam-outer" id="cam-wrap-scan">
                <video id="video-scan" playsinline muted autoplay></video>
                <div class="scan-line" id="scan-line"></div>
                <canvas id="canvas-scan" style="display:none;"></canvas>
            </div>

            <div class="rx-status" id="scan-status">Apunta la cámara al código QR...</div>

            <!-- Entrada manual -->
            <div style="text-align:center; margin-bottom:12px;">
                <input type="text" class="rx-field" id="field-manual-qr" placeholder="O ingresa el código manual (DEMO-XXXX)" autocomplete="off" style="width:90%; font-size:12px;">
                <button class="rx-btn rx-btn-secondary" onclick="lookupManual()" style="width:90%;">🔍 Buscar por código</button>
            </div>

            <!-- Resultado persona identificada -->
            <div class="rx-id-card" id="id-result">
                <img class="person-photo" id="id-photo" src="" alt="Foto">
                <div class="person-name" id="id-name">--</div>
                <div class="person-code" id="id-code">--</div>
                <button class="rx-btn rx-btn-secondary" onclick="resetScan()" style="margin-top:16px; width:80%;">🔄 Escanear otro</button>
            </div>
        </div>
    </div>
</div>

<script>
// ── ESTADO GLOBAL ──
let regStream = null;
let capturedBlob = null;
let capturedBase64 = null;
let scanStream = null;
let scanActive = false;
let rafId = null;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('main-logo').src = 'assets/G_nombrelogo.png?v=' + Date.now();
    loadCounter();
    startRegCamera();
});

// ── CONTADOR ──
async function loadCounter() {
    try {
        const r = await fetch('/api/demo/count');
        const d = await r.json();
        const used = d.count || 0;
        const left = 20 - used;
        document.getElementById('rx-counter').textContent =
            `📋 ${used}/20 registros usados — quedan ${left} espacios`;
    } catch(e) {
        document.getElementById('rx-counter').textContent = 'Sin conexión con el servidor';
    }
}

// ── SWITCH TAB ──
function switchTab(mode) {
    document.getElementById('tab-reg').classList.toggle('active', mode === 'reg');
    document.getElementById('tab-scan').classList.toggle('active', mode === 'scan');
    document.getElementById('panel-reg').classList.toggle('visible', mode === 'reg');
    document.getElementById('panel-scan').classList.toggle('visible', mode === 'scan');

    if (mode === 'reg') {
        stopScanCamera();
        startRegCamera();
    } else {
        stopRegCamera();
        startScanCamera();
    }
}

// ══════════════════════════════════════════
//  PANEL A — REGISTRAR
// ══════════════════════════════════════════
async function startRegCamera() {
    const video = document.getElementById('video-reg');
    try {
        regStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } }
        });
        video.srcObject = regStream;
        document.getElementById('reg-status').textContent = 'Cámara lista. Captura la foto.';
    } catch(e) {
        document.getElementById('reg-status').textContent = '⚠️ Cámara no disponible — usa el botón abajo 👇';
        // Enlugar de ocultarlo por completo, inyectamos el input directamente en el wrap
        showFileInput();
    }
}

function showFileInput() {
    const wrap = document.getElementById('cam-wrap-reg');
    wrap.style.display = 'block'; // Forzar visibilidad por si estaba oculto
    wrap.innerHTML = `
        <div style="padding:40px 10px; text-align:center; background: rgba(0,229,255,0.05);">
            <div style="color:#d8ff00; font-size:14px; font-weight:bold; margin-bottom:12px;">El navegador bloqueó la cámara directa</div>
            <div style="color:#4fc3ff; font-size:12px; margin-bottom:20px;">Toca cargar foto y usa la cámara de tu celular:</div>
            
            <label for="file-cam" style="display:inline-block; padding:15px 30px; background:#d8ff00; color:#001342; font-weight:bold; border-radius:30px; cursor:pointer;">
                📸 TOMAR / EXAMINAR FOTO
            </label>
            <input type="file" accept="image/*" capture="environment" id="file-cam"
                style="display:none;"
                onchange="handleFileCapture(event)">
        </div>`;
    wrap.style.aspectRatio = 'auto';
    wrap.style.height = 'auto';
    document.getElementById('btn-capture').style.display = 'none';
}

function handleFileCapture(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        capturedBase64 = ev.target.result;
        document.getElementById('preview-img').src = capturedBase64;
        document.getElementById('preview-wrap').style.display = 'block';
        document.getElementById('field-name').style.display = 'block';
        document.getElementById('btn-register').style.display = 'block';
        document.getElementById('field-name').focus();
        document.getElementById('reg-status').textContent = '✅ Foto cargada. Escribe el nombre.';
        enableRegBtn();
    };
    reader.readAsDataURL(file);
}

function capture() {
    const video = document.getElementById('video-reg');
    const canvas = document.getElementById('canvas-reg');
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    capturedBase64 = canvas.toDataURL('image/jpeg', 0.75);

    document.getElementById('preview-img').src = capturedBase64;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('btn-capture').style.display = 'none';
    document.getElementById('btn-retake').style.display = 'block';
    document.getElementById('field-name').style.display = 'block';
    document.getElementById('btn-register').style.display = 'block';
    document.getElementById('field-name').focus();
    document.getElementById('reg-status').textContent = '✅ Foto capturada. Escribe el nombre.';
    enableRegBtn();
}

function retake() {
    capturedBase64 = null;
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('btn-retake').style.display = 'none';
    document.getElementById('btn-capture').style.display = 'block';
    document.getElementById('field-name').style.display = 'none';
    document.getElementById('btn-register').style.display = 'none';
    document.getElementById('field-name').value = '';
    document.getElementById('reg-status').textContent = 'Cámara lista. Captura la foto.';
}

function enableRegBtn() {
    const btn = document.getElementById('btn-register');
    const name = document.getElementById('field-name');
    btn.disabled = !(capturedBase64 && name.value.trim().length > 1);
    name.addEventListener('input', () => {
        btn.disabled = !(capturedBase64 && name.value.trim().length > 1);
    });
}

async function register() {
    const name = document.getElementById('field-name').value.trim();
    if (!name || !capturedBase64) return;

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = '⏳ Guardando...';

    try {
        const r = await fetch('/api/demo/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, photo: capturedBase64 })
        });
        const data = await r.json();

        if (data.status === 'ok') {
            const code = data.code;
            // Mostrar QR usando API externa libre
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(code)}&color=001342&bgcolor=d8ff00`;
            document.getElementById('qr-img-gen').src = qrUrl;
            document.getElementById('qr-code-text').textContent = code;
            document.getElementById('reg-result').style.display = 'block';
            loadCounter();
            stopRegCamera();
        } else {
            alert(data.msg || 'Error al guardar');
            btn.disabled = false;
            btn.textContent = '✅ Guardar y Generar QR';
        }
    } catch(e) {
        alert('Error de conexión con el servidor');
        btn.disabled = false;
        btn.textContent = '✅ Guardar y Generar QR';
    }
}

function resetReg() {
    capturedBase64 = null;
    document.getElementById('reg-result').style.display = 'none';
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('btn-retake').style.display = 'none';
    document.getElementById('btn-capture').style.display = 'block';
    document.getElementById('field-name').style.display = 'none';
    document.getElementById('btn-register').style.display = 'none';
    document.getElementById('field-name').value = '';
    document.getElementById('btn-register').textContent = '✅ Guardar y Generar QR';
    document.getElementById('btn-register').disabled = true;
    document.getElementById('reg-status').textContent = 'Cámara lista. Captura la foto.';
    startRegCamera();
}

function stopRegCamera() {
    if (regStream) { regStream.getTracks().forEach(t => t.stop()); regStream = null; }
}

// ══════════════════════════════════════════
//  PANEL B — IDENTIFICAR (QR SCANNER)
// ══════════════════════════════════════════
async function startScanCamera() {
    const video = document.getElementById('video-scan');
    try {
        scanStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } }
        });
        video.srcObject = scanStream;
        scanActive = true;
        video.onloadedmetadata = () => { video.play(); tickScan(); };
    } catch(e) {
        document.getElementById('scan-status').textContent = '⚠️ Sin cámara — Escribe el código acá abajo 👇';
        document.getElementById('cam-wrap-scan').style.display = 'none';
    }
}

function tickScan() {
    if (!scanActive) return;
    const video = document.getElementById('video-scan');
    const canvas = document.getElementById('canvas-scan');
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
        if (code && code.data) {
            if (navigator.vibrate) navigator.vibrate(100);
            scanActive = false;
            lookupCode(code.data);
            return;
        }
    }
    rafId = requestAnimationFrame(tickScan);
}

function stopScanCamera() {
    scanActive = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (scanStream) { scanStream.getTracks().forEach(t => t.stop()); scanStream = null; }
}

function lookupManual() {
    const code = document.getElementById('field-manual-qr').value.trim().toUpperCase();
    if (!code) return;
    lookupCode(code);
}

async function lookupCode(code) {
    document.getElementById('scan-status').textContent = `🔍 Buscando: ${code}...`;
    document.getElementById('scan-line').style.display = 'none';

    try {
        const r = await fetch('/api/demo/lookup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code })
        });
        const data = await r.json();

        if (data.status === 'ok') {
            document.getElementById('id-photo').src = data.photo;
            document.getElementById('id-name').textContent = data.name.toUpperCase();
            document.getElementById('id-code').textContent = code;
            document.getElementById('id-result').style.display = 'block';
            document.getElementById('scan-status').textContent = '✅ ¡Persona identificada!';
            stopScanCamera();
        } else {
            document.getElementById('scan-status').textContent = '❌ QR no reconocido. Intenta de nuevo.';
            scanActive = true;
            tickScan();
        }
    } catch(e) {
        document.getElementById('scan-status').textContent = '⚠️ Error de conexión. Intenta de nuevo.';
        scanActive = true;
        tickScan();
    }
}

function resetScan() {
    document.getElementById('id-result').style.display = 'none';
    document.getElementById('scan-line').style.display = 'block';
    document.getElementById('scan-status').textContent = 'Apunta la cámara al código QR...';
    document.getElementById('field-manual-qr').value = '';
    document.getElementById('cam-wrap-scan').style.display = 'block';
    startScanCamera();
}
</script>
</body>
</html>
