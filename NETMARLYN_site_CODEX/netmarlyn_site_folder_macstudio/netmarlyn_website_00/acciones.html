<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        // NUCLEAR CACHE BUSTER (v5.3.3)
        const CURRENT_VERSION = '8813';
        if (localStorage.getItem('nm_force_refresh_v') !== CURRENT_VERSION) {
            localStorage.setItem('nm_force_refresh_v', CURRENT_VERSION);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    for(let reg of regs) reg.unregister();
                });
            }
            if ('caches' in window) {
                caches.keys().then(names => {
                    for (let name of names) caches.delete(name);
                });
            }
            window.location.reload(true);
        }
    </script>
    <title>Netmarlyn - Desktop</title>

    <!-- Configuración PWA (Manifiesto e Íconos) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001342">

    <!-- Configuración para iOS (iPhone/iPad) -->
    <link rel="apple-touch-icon" href="assets/G_icono_netmarlyn.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Netmarlyn">

    <link rel="icon" type="image/png" href="assets/favicon.png?v=1">
    <link rel="stylesheet" href="style.css?v=8813">
    <script src="js/nav_active.js"></script>

    <style>
        /* === ESTILOS DEL LOGIN === */
        .login-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 40px 30px;
            background-color: rgba(0, 50, 150, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .login-title {
            color: white;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #00e5ff;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-label {
            display: block;
            color: #a8a8a8;
            font-size: 12px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .password-wrapper {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #a8a8a8;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00e5ff 0%, #0077ff 100%);
            border: none;
            border-radius: 8px;
            color: #000c24;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* === ESTILOS DE LOS BOTONES DE ACCIÓN (ESTILO OFICIAL 202x65) === */
        .action-btn {
            position: relative;
            width: 202px;
            height: 65px;
            margin: 0 auto;
            background-image: url('assets/boton_netmarlyn_general.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .action-btn span {
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            text-shadow: 0 1px 6px rgba(0,0,0,0.7);
            pointer-events: none;
            line-height: 1.35;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .action-btn span em {
            font-style: normal;
            display: block;
        }

        .action-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }

        .page-title {
            text-align: center;
            color: #00e5ff;
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 40px;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <header class="top-bar">
            <nav class="top-nav">
                <a href="index.html?v=8813">inicio</a> • 
                <a href="colegios.html?v=8813">colegios</a> • 
                <a href="soporte.html?v=8813">soporte</a>
            </nav>
            <div class="logo-container">
                <img id="main-logo" src="assets/G_nombrelogo.png" alt="Netmarlyn Logo">
            </div>
        </header>

        <!-- El login ha sido centralizado en colegios.html (Puerta Frontal) -->

        <!-- Area de acciones oculta hasta hacer login -->
        <div id="main-actions-container" style="display: none;">
            <div class="page-title" id="colegio-identificado">
                ACCIONES
            </div>

            <section class="actions-grid">
                <!-- [1] -->
                <button class="action-btn" onclick="window.location.href='fotos.html'">
                    <span><em>TOMAR</em><em>FOTOS</em></span>
                </button>
                <!-- [2] MIGRADO A SOPORTE -->
                <button class="action-btn" onclick="logout()" style="filter: hue-rotate(140deg) brightness(1.2);">
                    <span><em style="color:#ff3333;">CERRAR</em><em style="color:#ff3333;">SESIÓN</em></span>
                </button>
                <!-- [3] -->
                <button class="action-btn">
                    <span><em>REPORTES</em></span>
                </button>
                <!-- [4] -->
                <button class="action-btn" onclick="window.location.href='listas.html'">
                    <span><em>LISTAS</em></span>
                </button>
            </section>
        </div>

    </div>

    <script>
        // ==========================================================
        // GUARDIÁN FRONTEND: Verificar Token JWT local
        // ==========================================================
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('netmarlyn_jwt');
            const nombreColegio = localStorage.getItem('netmarlyn_nombre');
            
            if (!token) {
                // Expulsar si no hay pulsera digital
                window.location.href = 'colegios.html';
                return;
            }

            // Mostrar el portal
            document.getElementById('main-actions-container').style.display = 'block';
            
            // Actualizar título con el nombre del colegio
            if (nombreColegio) {
                document.getElementById('colegio-identificado').innerHTML = `<span style="color:white; font-size:18px;">${nombreColegio}</span><br>ACCIONES`;
            }
        });

        function logout() {
            if (confirm("¿Está seguro de que desea cerrar sesión de forma segura?")) {
                localStorage.removeItem('netmarlyn_jwt');
                localStorage.removeItem('netmarlyn_colegio');
                localStorage.removeItem('netmarlyn_nombre');
                window.location.href = 'colegios.html';
            }
        }
    </script>

    <!-- Script para evitar SIEMPRE el caché de las imágenes durante el desarrollo -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var logo = document.getElementById("main-logo");
            if (logo) {
                // Le agrega un número aleatorio de tiempo al final (ej: ?v=170810...) para forzar la descarga de la imagen real.
                logo.src = 'assets/G_nombrelogo.png?v=' + new Date().getTime();
            }
        });
