<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netmarlyn - Galería de Infografías</title>
    <link rel="stylesheet" href="style.css?v=8813">
    <style>
        .gallery-panel {
            max-width: 800px;
            margin: 80px auto;
            text-align: center;
            color: white;
            padding: 0 20px;
        }
        .infography-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .info-card:hover {
            background: rgba(0, 229, 255, 0.1);
            transform: translateY(-5px);
            border-color: #00e5ff;
        }
        .info-card h3 {
            font-size: 16px;
            color: #00e5ff;
            margin-bottom: 10px;
        }
        .info-card p {
            font-size: 12px;
            color: #8b9bb4;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="top-bar">
            <nav class="top-nav">
                <a href="index.html?v=8813">inicio</a> - 
                <a href="colegios.html?v=8813">colegios</a> - 
                <a href="soporte.html?v=8813">soporte</a>
            </nav>
            <div class="logo-container">
                <img src="assets/G_nombrelogo.png" alt="Netmarlyn Logo" style="width: 140px;">
            </div>
        </header>

        <section class="gallery-panel">
            <h2 style="letter-spacing: 4px; text-transform: uppercase;">Mis Infografías</h2>
            <p style="color: #8b9bb4; font-size: 14px;">Aquí aparecerán las infografías generadas por la IA.</p>
            
            <div class="infography-list" id="gallery">
                <!-- Los resultados aparecerán aquí dinámicamente -->
            </div>

            <style>
                /* Estilos para el Visor de la IA */
                #ai-viewer {
                    display: none;
                    position: fixed;
                    top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(0, 19, 66, 0.95);
                    z-index: 1000;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    backdrop-filter: blur(10px);
                }
                .viewer-content {
                    width: 90%;
                    max-width: 500px;
                    background: #001342;
                    border: 2px solid #00e5ff;
                    border-radius: 20px;
                    padding: 20px;
                    box-shadow: 0 0 50px rgba(0, 229, 255, 0.3);
                }
            </style>

            <div id="ai-viewer" onclick="this.style.display='none'">
                <div class="viewer-content" onclick="event.stopPropagation()">
                    <div id="svg-container"></div>
                    <div style="margin-top: 20px; text-align: center;">
                        <button class="btn-netmarlyn" onclick="document.getElementById('ai-viewer').style.display='none'">
                            <span><em>CERRAR</em><em>VISOR</em></span>
                        </button>
                    </div>
                </div>
            </div>

            <script>
                async function cargarGaleria() {
                    const galleryDiv = document.getElementById('gallery');
                    try {
                        const res = await fetch('/api/listar_infografias?v=' + Date.now());
                        const data = await res.json();
                        
                        // data ahora trae id (ej: peticion_2026.json). 
                        // El servidor genera infografia_2026.html
                        data.forEach(item => {
                            const htmlId = item.id.replace('peticion_', 'infografia_').replace('.json', '.html');
                            const card = document.createElement('div');
                            card.className = 'info-card';
                            card.style.borderColor = '#00e5ff';
                            card.style.background = 'rgba(0, 229, 255, 0.15)';
                            card.innerHTML = `
                                <div style="font-size: 10px; color: #00e5ff; margin-bottom: 10px; font-weight: bold;">✨ IA LISTA (VER)</div>
                                <h3>${item.titulo}</h3>
                                <p>${item.fecha}</p>
                            `;
                            
                            // AL CLICKEAR: Vamos al HTML generado por el servidor
                            card.onclick = () => window.location.href = 'infografias_full/' + htmlId;
                            galleryDiv.prepend(card);
                        });
                    } catch (e) { console.error("Error al cargar galería dinámica", e); }
                }

                async function verInfografiaIA(id) {
                    const viewer = document.getElementById('ai-viewer');
                    const container = document.getElementById('svg-container');
                    viewer.style.display = 'flex';
                    container.innerHTML = "<p style='color:white;'>Cargando datos IA...</p>";

                    try {
                        const res = await fetch('infografias_full/' + id);
                        const data = await res.json();
                        const texto = data.texto || "Sin texto disponible";

                        // GENERACIÓN DEL SVG DINÁMICO (LA MAGIA DE LA IA EN EL BROWSER PARA LA DEMO)
                        container.innerHTML = `
                            <svg width="100%" height="450" viewBox="0 0 320 450">
                                <defs>
                                    <linearGradient id="gIA" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" style="stop-color:#001342;stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:#002c8c;stop-opacity:1" />
                                    </linearGradient>
                                </defs>
                                <rect width="320" height="450" fill="url(#gIA)" rx="15" />
                                <text x="50%" y="40" font-size="22" fill="#00e5ff" text-anchor="middle" font-family="Arial" font-weight="bold">NETMARLYN IA</text>
                                
                                <circle cx="160" cy="160" r="70" fill="none" stroke="#00e5ff" stroke-width="3" stroke-dasharray="5,5" />
                                <text x="160" y="165" font-size="12" fill="white" text-anchor="middle" font-family="Arial">PROCESANDO TEMA...</text>
                                
                                <rect x="20" y="270" width="280" height="150" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(0,229,255,0.2)" />
                                <text x="35" y="295" font-size="14" fill="#00e5ff" font-family="Arial" font-weight="bold">ANÁLISIS DE LA CLASE:</text>
                                
                                <foreignObject x="35" y="310" width="250" height="100">
                                    <div style="color:white; font-size:12px; font-family:Arial; line-height:1.4;">
                                        ${texto.substring(0, 300)}${texto.length > 300 ? '...' : ''}
                                    </div>
                                </foreignObject>
                                
                                <circle cx="50" cy="160" r="10" fill="#00e5ff"><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" /></circle>
                                <circle cx="270" cy="160" r="10" fill="#00e5ff"><animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite" /></circle>
                            </svg>
                        `;
                    } catch (e) {
                        container.innerHTML = "<p style='color:red;'>Error al cargar JSON</p>";
                        console.error(e);
                    }
                }
                
                cargarGaleria();
            </script>
            
            <div style="margin-top: 50px;">
                <div class="btn-netmarlyn" onclick="location.href='soporte.html?v=8813'">
                    <img class="btn-bg" src="assets/boton_netmarlyn_general.png" alt="Volver">
                    <span><em>VOLVER</em><em>A SOPORTE</em></span>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
