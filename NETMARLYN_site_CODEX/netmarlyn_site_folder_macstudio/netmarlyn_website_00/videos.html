<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Netmarlyn - Desktop</title>

    <!-- Configuración PWA (Manifiesto e Íconos) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001342">

    <!-- Configuración para iOS (iPhone/iPad) -->
    <link rel="apple-touch-icon" href="assets/G_icono_netmarlyn.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Netmarlyn">

    <link rel="icon" type="image/png" href="assets/favicon.png?v=1">
    <link rel="stylesheet" href="style.css?v=10">
    <script src="js/nav_active.js"></script>
</head>

<body>
    <div class="main-container">
        <header class="top-bar">
            <nav class="top-nav">
                <a href="index.html">inicio</a> - 
                <a href="colegios.html">colegios</a> - 
                <a href="soporte.html">soporte</a>
            </nav>
            <div class="logo-container">
                <img id="main-logo" src="assets/G_nombrelogo.png" alt="Netmarlyn Logo">
            </div>
        </header>

        <section class="nebula-section">
            <div class="content-wrapper">
                <div class="illustration">
                    <img src="assets/G_maestro_alumno.png" alt="Maestro y Alumno">
                </div>
                <div class="text-content">
                    <div class="text-white">
                        Innovador Ecosistema Escolar Digital<br>
                        Métricas Académicas Inteligentes<br>
                        24/7
                    </div>
                    <div class="text-blue">
                        Plataforma escolar digital con identidad<br>
                        segura que integra control<br>
                        analítica pedagógica y<br>
                        supervisión parental en tiempo real<br>
                        para impulsar excelencia educativa.
                    </div>
                    <div class="button-area">
                        <img src="assets/G_boton_escaneo.png" alt="Botón Escaneo" class="scan-button">
                    </div>
                </div>
            </div>
        </section>

        <div class="title-colegios">
            COLEGIOS
        </div>


    </div>

    <!-- Script para evitar SIEMPRE el caché de las imágenes durante el desarrollo -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var logo = document.getElementById("main-logo");
            if (logo) {
                // Le agrega un número aleatorio de tiempo al final (ej: ?v=170810...) para forzar la descarga de la imagen real.
                logo.src = 'assets/G_nombrelogo.png?v=' + new Date().getTime();
            }
        });

        // Registro del Service Worker para convertir la web en App (PWA) instalable
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Service Worker registrado con éxito:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Error al registrar el Service Worker:', error);
                    });
            });
        }
    </script>
</body>

</html>
