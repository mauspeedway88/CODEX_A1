<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infografía Óptima SVG Puro</title>
    <link rel="stylesheet" href="infografia.css">
</head>
<body>
    <div class="infografia-container" id="infra-app">
        <div style="margin: auto; color: #00e5ff; font-weight: bold;">Compilando SVGs Puros...</div>
    </div>

    <script>
        async function buildInfographic() {
            try {
                const response = await fetch('data_infografia.json');
                const data = await response.json();
                
                const container = document.getElementById('infra-app');
                
                let flowHTML = '';
                let imgCount = 0;
                
                data.sections.forEach((sec) => {
                    let imgHTML = '';
                    if (sec.svgInline) {
                        const floatClass = imgCount % 2 === 0 ? 'organic-img-right' : 'organic-img-left';
                        imgHTML = `<div class="svg-wrapper ${floatClass}" onclick="this.classList.toggle('zoomed')">${sec.svgInline}</div>`;
                        imgCount++;
                    }
                    
                    flowHTML += `
                        <div class="organic-block">
                            ${imgHTML}
                            <h3 class="section-title">${sec.subtitle}</h3>
                            <p class="section-text">${sec.content}</p>
                        </div>
                    `;
                });

                container.innerHTML = `
                    <div class="info-header">
                        <h1 class="info-title">${data.title}</h1>
                    </div>
                    
                    <div class="organic-content">
                        ${flowHTML}
                    </div>
                    
                    <div class="info-summary">
                        “${data.summary}”
                    </div>
                `;
                
                const palettes = [
                    { bg: 'linear-gradient(145deg, #050b14 0%, #161e38 100%)', tColor: '#f1f5f9', brand: '#fcd34d' }, // Blue/Gold
                    { bg: 'linear-gradient(145deg, #091a13 0%, #1d3627 100%)', tColor: '#f1fdf9', brand: '#34d399' }, // Green
                    { bg: 'linear-gradient(145deg, #1b0a14 0%, #301828 100%)', tColor: '#fdf2f8', brand: '#fb7185' }, // Crimson
                    { bg: 'linear-gradient(145deg, #0f1524 0%, #1a2235 100%)', tColor: '#ffffff', brand: '#2dd4bf' }  // Tech Teal
                ];
                const selected = palettes[Math.floor(Math.random() * palettes.length)];
                
                container.style.background = selected.bg;
                container.style.color = selected.tColor;
                
                document.querySelectorAll('.info-badge').forEach(b => {
                    b.style.color = selected.brand;
                    b.style.background = `rgba(${parseInt(selected.brand.slice(1,3), 16)}, ${parseInt(selected.brand.slice(3,5), 16)}, ${parseInt(selected.brand.slice(5,7), 16)}, 0.1)`;
                });
                
                document.querySelectorAll('.section-title').forEach(t => t.style.color = selected.brand);
                document.querySelector('.info-summary').style.borderLeftColor = selected.brand;
                document.querySelectorAll('.svg-wrapper').forEach(w => w.style.borderColor = selected.brand);

            } catch (error) {
                console.error(error);
                document.getElementById('infra-app').innerHTML = `
                    <div style="margin: auto; color: #ff0044; text-align: center;">
                        <b>ERROR AL LEER EL JSON</b>
                    </div>
                `;
            }
        }
        buildInfographic();
    </script>
</body>
</html>
