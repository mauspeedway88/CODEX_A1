<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marlyn3D - Early Access</title>

    <!-- ICONO EN LA PESTAÑA (Favicon) -->
    <link rel="icon" type="image/png" href="favicon3D.png?v=2">

    <!-- WHATSAPP / FACEBOOK PREVIEW (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.marlyn3d.site/">
    <meta property="og:title" content="Marlyn3D - AI Powered 3D Factory">
    <meta property="og:description"
        content="Generate production-ready 3D textured assets from any image. Join the early access list now!">
    <meta property="og:image" content="https://www.marlyn3d.site/share_image.jpg">

    <!-- TWITTER PREVIEW -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Marlyn3D - AI Powered 3D Factory">
    <meta name="twitter:description" content="Convert 2D images to 3D assets automatically.">
    <meta name="twitter:image" content="https://www.marlyn3d.site/share_image.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #000000;
            overflow: auto;
            padding: 7px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Contenedor principal de la imagen (Responsivo) */
        .image-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 800 / 700;
            display: block;
            margin-bottom: 20px;
        }

        .promo-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* Grupo GIF + Botón Video (Derecha) */
        .video-group {
            position: absolute;
            bottom: 88px;
            right: 90px;
            /* Movido 25px adicionales a la izquierda (65 + 25) */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .soldier-gif {
            width: 110px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 7px;
            /* Mantengo 7px (es mayor a los 4px mínimos pedidos) */
        }

        .yt-button {
            width: 140px;
            height: 45px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .yt-button:hover {
            background: rgba(255, 0, 0, 1);
            transform: scale(1.05);
        }

        /* Botón EMAIL LIST (Ajustado Final) */
        .email-list-btn {
            position: absolute;
            bottom: 16px;
            /* Bajado 3px adicionales (19 - 3) */
            left: calc(50% - 280px);
            /* Movido 40px más a la izquierda (240 + 40) */
            transform: translateX(-50%);
            width: 180px;
            height: 45px;
            background-color: #4957c2;
            /* Azul Royal */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(73, 87, 194, 0.4);
            transition: all 0.3s ease;
            z-index: 110;
        }

        .email-list-btn:hover {
            background-color: #5a69d4;
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 6px 20px rgba(73, 87, 194, 0.6);
        }

        /* Modal del Formulario */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #1a1b1c;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
            color: white;
            text-align: center;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #90cf16;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #888;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #90cf16;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .close-btn {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="image-container">
        <!-- Nueva Imagen B3 (800x700) -->
        <img src="share_image.jpg?v=123" alt="Marlyn3D Promo" class="promo-img">

        <!-- Video Group -->
        <div class="video-group">
            <img src="soldier.gif" alt="Soldier" class="soldier-gif">
            <a href="https://youtube.com/shorts/CgjakfGouZ0?si=aaRQNj51Z2NV7eeF" target="_blank" class="yt-button">
                HERE VIDEO
            </a>
        </div>

        <!-- Botón Email List sobre el cuadro verde -->
        <button class="email-list-btn" onclick="openModal()">Email List</button>
    </div>

    <!-- Modal Form (Netlify Forms automatic database) -->
    <div id="emailModal" class="modal">
        <div class="modal-content">
            <h2>Join the List</h2>
            <p style="font-size: 13px; margin-bottom: 20px; color: #aaa;">Register to get free credits when we launch!
            </p>

            <!-- Mensaje de Éxito (Oculto al inicio) -->
            <div id="successMessage" style="display: none; color: #90cf16; font-weight: bold; padding: 20px;">
                <h3 style="font-size: 24px; margin-bottom: 10px;">SUCCESS!</h3>
                <p>You are now on the official list.</p>
                <div class="close-btn" onclick="closeModal()" style="margin-top: 20px;">Close</div>
            </div>

            <!-- Formulario simplificado con FormSubmit -->
            <form id="leadForm" action="https://formsubmit.co/mauspeedway@gmail.com" method="POST">

                <!-- Redirección tras envío (opcional, para que no se vea feo) -->
                <input type="hidden" name="_next" value="https://api.marlyn3d.site/thanks.html">
                <input type="hidden" name="_captcha" value="false">

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com">
                </div>
                <button type="submit" class="submit-btn">REGISTER NOW</button>
                <div class="close-btn" onclick="closeModal()">Close</div>
            </form>
        </div>
    </div>

    <!-- Script simplificado -->
    <script>
        function openModal() {
            document.getElementById('emailModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('emailModal').style.display = 'none';
        }

        // Ya no necesitamos fetch complicado, el formulario lo hace solo.
        window.onclick = function (event) {
            let modal = document.getElementById('emailModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>

</html>
