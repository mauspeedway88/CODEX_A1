<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETMARLYN | Educación Conectada</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="favicon3D.png" alt="Netmarlyn Logo" height="40">
            <span style="font-family: var(--font-title); font-weight: 800; font-size: 1.2rem; margin-left: 10px;">NETMARLYN</span>
        </div>
        <ul class="nav-links">
            <li><a href="#safe-pass">SAFE-PASS</a></li>
            <li><a href="#inforecreo">INFORECREO</a></li>
            <li><a href="#dashboards">Dashboards</a></li>
        </ul>
        <button class="btn-premium">Iniciar Sesión</button>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Educación con Poder 3D</h1>
                <p class="hero-subtitle">La primera PWA modular diseñada para transformar la gestión escolar y el aprendizaje interactivo en más de 200 colegios.</p>
                <div class="hero-stats" style="display: flex; gap: 30px; margin-bottom: 30px;">
                    <div>
                        <h3 id="stat-colegios" style="font-size: 2rem; color: var(--primary);">200+</h3>
                        <p style="font-size: 0.9rem; color: var(--text-muted);">Colegios</p>
                    </div>
                    <div>
                        <h3 id="stat-alumnos" style="font-size: 2rem; color: var(--secondary);">50k+</h3>
                        <p style="font-size: 0.9rem; color: var(--text-muted);">Alumnos</p>
                    </div>
                </div>
                <button class="btn-premium" style="font-size: 1.1rem; padding: 15px 40px;">Explorar Módulos</button>
            </div>
            <div id="hero-canvas"></div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
